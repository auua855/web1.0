<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リアルタイムトレンドエクスプローラー</title>
    <!-- PWA configuration -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <meta name="theme-color" content="#8b5cf6">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header>
            <div class="logo-container">
                <div class="logo-icon"></div>
                <h1>Real-time Trend Explorer</h1>
            </div>
            <button id="settings-btn" class="icon-btn" aria-label="Settings">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </header>

        <!-- Main Content -->
        <main>
            <!-- Search Area -->
            <div class="search-container">
                <p class="subtitle">AIの力で、言葉の奥にある現在のトレンドを探求します</p>
                <div id="current-datetime" class="datetime-display"></div>
                <form id="search-form" class="search-box">
                    <input type="text" id="keyword-input" placeholder="調べたい用語を入力 (例: AI, 映画, テクノロジー)" required autocomplete="off">
                    <button type="submit" class="primary-btn">
                        <span>検索</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
            </div>

            <!-- Loader -->
            <div id="loader" class="loader-container hidden">
                <div class="spinner"></div>
                <p class="loader-text">AIが世界のトレンドを分析中...</p>
            </div>

            <!-- Results History (Breadcrumbs like) -->
            <div id="history-container" class="history-crumbs"></div>

            <!-- Results Grid -->
            <div id="results-container" class="results-grid">
                <!-- Trend items injected by JS -->
            </div>
            
            <div id="welcome-state" class="empty-state">
                <div class="empty-icon">🌍</div>
                <h2>世界で今、何が起きている？</h2>
                <p>上の検索窓からキーワードを入力して、トレンド情報を探ってみましょう。</p>
            </div>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>設定</h2>
                <button id="close-settings" class="icon-btn close-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="api-key">Gemini API キー <span class="required">*</span></label>
                    <input type="password" id="api-key" placeholder="AIzaSy...">
                    <small>取得したAPIキーを入力してください。データはブラウザ内にのみ保存されます。</small>
                </div>
                <div class="form-group">
                    <label for="model-select">使用モデル</label>
                    <div class="custom-select">
                        <select id="model-select">
                            <option value="gemini-3.1-pro-preview">gemini-3.1-pro-preview</option>
                            <option value="gemini-3-flash-preview">gemini-3-flash-preview</option>
                            <option value="gemini-3.1-flash-lite-preview">gemini-3.1-flash-lite-preview</option>
                            <option value="gemini-2.5-flash">gemini-2.5-flash</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="save-settings" class="primary-btn full-width">保存して閉じる</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').then((registration) => {
                    console.log('ServiceWorker registration successful');
                }, (err) => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
