<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a0845" />
      <stop offset="100%" stop-color="#6441A5" />
    </linearGradient>
    
    <!-- Accent Gradient for Lens -->
    <linearGradient id="lens" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#00FFA3" />
      <stop offset="50%" stop-color="#03E1FF" />
      <stop offset="100%" stop-color="#DC1FFF" />
    </linearGradient>
    
    <!-- Inner Lens Glass Effect -->
    <radialGradient id="glass" cx="30%" cy="30%" r="70%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.0)" />
    </radialGradient>

    <!-- Glowing Shadow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base Rectangle with smooth corners -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" />

  <!-- Constellation / Trend Nodes Background -->
  <path d="M120,350 L200,280 L250,320 L350,180 L420,220" stroke="rgba(255,255,255,0.15)" stroke-width="6" fill="none" stroke-linejoin="round" />
  <circle cx="120" cy="350" r="8" fill="rgba(255,255,255,0.3)" />
  <circle cx="200" cy="280" r="10" fill="rgba(255,255,255,0.4)" />
  <circle cx="250" cy="320" r="8" fill="rgba(255,255,255,0.3)" />
  <circle cx="350" cy="180" r="14" fill="rgba(255,255,255,0.6)" />
  <circle cx="420" cy="220" r="10" fill="rgba(255,255,255,0.4)" />

  <!-- Main Search Lens Graphics -->
  <g transform="translate(40, -10)">
    <!-- Handle -->
    <g transform="rotate(45, 300, 310)">
      <rect x="240" y="300" width="36" height="120" rx="18" fill="url(#lens)" opacity="0.8" />
      <rect x="250" y="305" width="16" height="110" rx="8" fill="rgba(255,255,255,0.2)" />
    </g>

    <!-- Outer Ring -->
    <circle cx="210" cy="220" r="90" fill="none" stroke="url(#lens)" stroke-width="24" filter="url(#glow)" />
    
    <!-- Inner Lens -->
    <circle cx="210" cy="220" r="78" fill="url(#glass)" />
    <circle cx="210" cy="220" r="78" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="4" />
    
    <!-- Lens Flare Effect -->
    <path d="M165,185 A50,50 0 0,1 235,165" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="6" stroke-linecap="round" />
  </g>

  <!-- Central Core (AI spark) -->
  <circle cx="250" cy="210" r="28" fill="url(#lens)" filter="url(#glow)" />
  <circle cx="250" cy="210" r="15" fill="#fff" />
</svg>
